<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO App — Mock</title>
    <style>
      :root {
        --text: #aaa;
        --text-h: #222;
        --bg: #fff;
        --border: #ebebeb;
        --sans: system-ui, "Segoe UI", Roboto, sans-serif;

        font: 15px/150% var(--sans);
        color: var(--text);
        background: #f7f7f7;
        -webkit-font-smoothing: antialiased;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 60px 16px 100px;
      }

      /* === TODOアプリ本体 === */
      .todo-app {
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: var(--bg);
      }

      .todo-header {
        padding: 24px 20px 0;
      }

      .todo-title {
        font-size: 48px;
        font-weight: 200;
        letter-spacing: -1px;
        color: #ddd;
        text-align: center;
        margin: 0 0 16px;
      }

      /* 入力エリア */
      .todo-input-row {
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--border);
      }

      .toggle-all {
        appearance: none;
        width: 44px;
        height: 44px;
        cursor: pointer;
        flex-shrink: 0;
        position: relative;
        border: none;
        background: none;
      }

      .toggle-all::after {
        content: "❯";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(90deg);
        font-size: 14px;
        color: #ddd;
      }

      .toggle-all.active::after {
        color: #999;
      }

      .new-todo-input {
        flex: 1;
        border: none;
        outline: none;
        font-size: 15px;
        padding: 14px 8px;
        background: transparent;
        color: var(--text-h);
        font-family: var(--sans);
      }

      .new-todo-input::placeholder {
        color: #ddd;
        font-style: italic;
        font-weight: 300;
      }

      /* TODOリスト */
      .todo-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      /* TODOアイテム */
      .todo-item {
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--border);
        padding: 0 12px;
        min-height: 52px;
      }

      .todo-item:last-child {
        border-bottom: none;
      }

      .todo-item:hover .todo-delete {
        opacity: 1;
      }

      /* チェックボックス */
      .todo-check {
        appearance: none;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 1px solid #ddd;
        cursor: pointer;
        flex-shrink: 0;
        position: relative;
        margin-right: 12px;
        background: none;
      }

      .todo-check:checked {
        border-color: #ccc;
      }

      .todo-check:checked::after {
        content: "✓";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 12px;
        color: #bbb;
      }

      /* TODOテキスト */
      .todo-label {
        flex: 1;
        font-size: 15px;
        color: var(--text-h);
        padding: 14px 0;
        cursor: default;
        font-weight: 400;
      }

      .todo-item.completed .todo-label {
        color: #ccc;
        text-decoration: line-through;
        text-decoration-color: #ddd;
      }

      /* 削除ボタン */
      .todo-delete {
        background: none;
        border: none;
        font-size: 18px;
        color: #ccc;
        cursor: pointer;
        opacity: 0;
        padding: 4px 6px;
        line-height: 1;
        transition: color 0.1s;
        flex-shrink: 0;
      }

      .todo-delete:hover {
        color: #999;
      }

      /* 編集中アイテム */
      .todo-item.editing {
        padding: 0;
        border-bottom: 1px solid #ddd;
      }

      .todo-edit-input {
        flex: 1;
        border: none;
        outline: 1px solid #ccc;
        font-size: 15px;
        padding: 14px 12px 14px 48px;
        background: #fafafa;
        color: var(--text-h);
        font-family: var(--sans);
        width: 100%;
      }

      /* フッター */
      .todo-footer {
        display: none;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        font-size: 12px;
        color: #bbb;
        border-top: 1px solid var(--border);
        gap: 6px;
      }

      .todo-count {
        min-width: 80px;
      }

      .todo-count strong {
        font-weight: 600;
        color: #888;
      }

      .todo-filters {
        display: flex;
        gap: 2px;
      }

      .filter-btn {
        background: none;
        border: 1px solid transparent;
        border-radius: 3px;
        padding: 2px 8px;
        font-size: 12px;
        cursor: pointer;
        color: #bbb;
        font-family: var(--sans);
      }

      .filter-btn.active {
        border-color: #ccc;
        color: #666;
      }

      .clear-completed {
        background: none;
        border: none;
        font-size: 12px;
        color: #bbb;
        cursor: pointer;
        font-family: var(--sans);
        padding: 2px 4px;
        visibility: hidden;
        min-width: 80px;
        text-align: right;
      }

      .clear-completed:hover {
        color: #999;
      }

      /* 空の状態 */
      .todo-empty {
        padding: 32px;
        text-align: center;
        color: #ddd;
        font-size: 14px;
        font-style: italic;
        font-weight: 300;
      }

      /* ヒント */
      .hint {
        text-align: center;
        font-size: 12px;
        color: #ccc;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="todo-app">
      <div class="todo-header">
        <h1 class="todo-title">todos</h1>
        <div class="todo-input-row">
          <button class="toggle-all" id="toggle-all" aria-label="全て選択"></button>
          <input
            class="new-todo-input"
            id="new-todo-input"
            type="text"
            placeholder="What needs to be done?"
            autofocus
          />
        </div>
      </div>
      <ul class="todo-list" id="todo-list">
        <li class="todo-empty">タスクを追加してください</li>
      </ul>
      <div class="todo-footer" id="todo-footer">
        <span class="todo-count" id="todo-count"></span>
        <div class="todo-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <button class="clear-completed" id="clear-completed">Clear completed</button>
      </div>
    </div>

    <p class="hint">Enter で追加 / ダブルクリックで編集 / Enter or Esc で編集確定</p>

    <script>
      let todos = [];
      let filter = "all";
      let editingId = null;

      const newInput = document.getElementById("new-todo-input");
      const list = document.getElementById("todo-list");
      const footer = document.getElementById("todo-footer");
      const countEl = document.getElementById("todo-count");
      const toggleAllBtn = document.getElementById("toggle-all");
      const clearCompletedBtn = document.getElementById("clear-completed");

      // Enterでタスク追加
      newInput.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        const text = newInput.value.trim();
        if (!text) return;
        todos.push({ id: Date.now(), text, completed: false });
        newInput.value = "";
        render();
      });

      // toggle-all
      toggleAllBtn.addEventListener("click", () => {
        const allDone = todos.every((t) => t.completed);
        todos.forEach((t) => (t.completed = !allDone));
        render();
      });

      // Clear completed
      clearCompletedBtn.addEventListener("click", () => {
        todos = todos.filter((t) => !t.completed);
        render();
      });

      // フィルター
      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          filter = btn.dataset.filter;
          document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          render();
        });
      });

      function escHtml(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      function render() {
        const visible = todos.filter((t) => {
          if (filter === "active") return !t.completed;
          if (filter === "completed") return t.completed;
          return true;
        });

        if (todos.length === 0) {
          list.innerHTML = '<li class="todo-empty">タスクを追加してください</li>';
        } else if (visible.length === 0) {
          list.innerHTML = '<li class="todo-empty">該当するタスクがありません</li>';
        } else {
          list.innerHTML = visible
            .map((t) => {
              if (editingId === t.id) {
                return `
                  <li class="todo-item editing" data-id="${t.id}">
                    <input class="todo-edit-input" type="text" value="${escHtml(t.text)}" />
                  </li>`;
              }
              return `
                <li class="todo-item${t.completed ? " completed" : ""}" data-id="${t.id}">
                  <input class="todo-check" type="checkbox"${t.completed ? " checked" : ""} />
                  <label class="todo-label">${escHtml(t.text)}</label>
                  <button class="todo-delete" aria-label="削除">×</button>
                </li>`;
            })
            .join("");
        }

        // フッター
        footer.style.display = todos.length ? "flex" : "none";

        // カウント
        const activeCount = todos.filter((t) => !t.completed).length;
        countEl.innerHTML = `<strong>${activeCount}</strong> item${activeCount !== 1 ? "s" : ""} left`;

        // toggle-all
        toggleAllBtn.classList.toggle("active", todos.length > 0 && todos.every((t) => t.completed));

        // Clear completed
        clearCompletedBtn.style.visibility = todos.some((t) => t.completed) ? "visible" : "hidden";

        // イベント登録
        list.querySelectorAll(".todo-check").forEach((cb) => {
          cb.addEventListener("change", () => {
            const id = Number(cb.closest(".todo-item").dataset.id);
            const todo = todos.find((t) => t.id === id);
            if (todo) todo.completed = cb.checked;
            render();
          });
        });

        list.querySelectorAll(".todo-delete").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = Number(btn.closest(".todo-item").dataset.id);
            todos = todos.filter((t) => t.id !== id);
            render();
          });
        });

        list.querySelectorAll(".todo-label").forEach((label) => {
          label.addEventListener("dblclick", () => {
            editingId = Number(label.closest(".todo-item").dataset.id);
            render();
            const editInput = list.querySelector(".todo-edit-input");
            if (editInput) {
              editInput.focus();
              editInput.selectionStart = editInput.value.length;
            }
          });
        });

        const editInput = list.querySelector(".todo-edit-input");
        if (editInput) {
          const commitEdit = () => {
            const text = editInput.value.trim();
            if (text) {
              const todo = todos.find((t) => t.id === editingId);
              if (todo) todo.text = text;
            } else {
              todos = todos.filter((t) => t.id !== editingId);
            }
            editingId = null;
            render();
          };

          editInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") commitEdit();
            if (e.key === "Escape") { editingId = null; render(); }
          });

          editInput.addEventListener("blur", commitEdit);
        }
      }
    </script>
  </body>
</html>
